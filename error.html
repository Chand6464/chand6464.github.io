<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error</title>
    <style>
        body{
            background-color: #0f0f10;
            color: #e0e0e0;
            font-family: minecraftia, sans-serif;
            margin: 0;
            padding: 0;
        }

        .container {
            color: #00ff59;
            background-color: #1f1f1f;
            text-align: center;
            margin-top: 20vh;
            padding: 50px;
            width: 25%;
            height: 20%;
            border-radius: 50px;
            box-shadow: 0 0 20px #065937;
            border: 2px solid #065937;
            text-decoration: solid;
            
        }

        .container a {
            color: #00ff59;
            text-decoration: solid;
            font-size: 1.2rem;
            border: 2px solid #065937;
            padding: 2px 15px;
            border-radius: 10px;
            transition: background-color 0.3s, color 0.3s;
            align-items: center;
            text-align: center;
            display: inline-block;
            text-transform: lowercase;
        }

        .container a:hover {
            background-color: #065937;
            color: #0f0f10;
        }
    </style>
</head>
<body>
    <center>
    <div class="container">
        <h1>404</h1>
        <p>Page Not Found</p>
        <a href="/">Go Home</a>
    </div>
    </center>
</body>
</html>
